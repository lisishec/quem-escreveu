<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quem escreveu?</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Solway:wght@300;400;500;700;800&family=Special+Elite&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <header>
        <h1>Quem escreveu?</h1>
    </header>
    <main>
        <section class="adicionar">
            <button onclick="Abrir()"><i class="fa-solid fa-plus"></i>Adicionar frase</button>
        </section>
        <!----------------FORM-------------------->
        <div class="modal" id="modal">
            <form action="" id="form" class="form">
                <h2>Criar frase</h2>
                <label for="nome">Autor</label>
                <input type="text" id="nome" placeholder="SEU nome" required>
                <label for="texto">Frase</label>
                <input type="text" id="texto" placeholder="Digite sua frase" required>
                <div class="form-buttons">
                    <button>Criar</button>
                    <button onclick="Fechar()">Cancelar</button>
                </div>
            </form>
        </div>
        <!------------------------------------>
        <div class="container-princ" id="container"></div>
        
        <div class="card-modal" id="modal">
            <div class="cardmod">
                <p id="modal-texto"></p>
                <button onclick="Opcoes()">Adivinhar</button>
                <div class="opcoes"></div>
            </div>
        </div>
    </main>
    <footer>
        <h2>Ranking</h2>
        <div class="ranking" id="ranking"></div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
